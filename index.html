<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cash Flow Tracker</title>

    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

    <div class="container">

        <h1>💰 Cash Flow Tracker</h1>

        <!-- Salary Section -->
        <div class="card">
            <h2>Set Salary</h2>

            <input
                type="number"
                id="salary"
                placeholder="Enter Total Salary"
            >

            <button id="salaryBtn">
                Save Salary
            </button>
        </div>

        <!-- Expense Section -->
        <div class="card">
            <h2>Add Expense</h2>

            <input
                type="text"
                id="expenseName"
                placeholder="Expense Name"
            >

            <input
                type="number"
                id="expenseAmount"
                placeholder="Expense Amount"
            >

            <button id="expenseBtn">
                Add Expense
            </button>
        </div>

        <!-- Currency Converter -->
        <div class="card">
            <h2>Currency</h2>

            <select id="currency">
                <option value="INR">INR (₹)</option>
                <option value="USD">USD ($)</option>
            </select>
        </div>

        <!-- Summary -->
        <div class="summary">

            <div class="summary-card">
                <h3>Total Salary</h3>
                <p id="salaryDisplay">₹0</p>
            </div>

            <div class="summary-card">
                <h3>Total Expenses</h3>
                <p id="expenseDisplay">₹0</p>
            </div>

            <div class="summary-card">
                <h3>Remaining Balance</h3>
                <p id="balance">₹0</p>
            </div>

        </div>

        <!-- Warning Banner -->
        <div id="warningBanner" class="warning">
            ⚠ Warning! Balance is below 10% of your salary.
        </div>

        <!-- Expense List -->
        <div class="card">

            <div class="expense-header">
                <h2>Expense List</h2>

                <button id="downloadBtn">
                    Download Report
                </button>
            </div>

            <ul id="expenseList"></ul>

        </div>

        <!-- Chart -->
        <div class="card chart-card">
            <h2>Expense Analysis</h2>

            <canvas id="myChart"></canvas>
        </div>

    </div>

    <script src="app.js"></script>

</body>
</html>
